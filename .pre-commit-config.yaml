default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt -w
        language: system
        types: [go]
      - id: goimports
        name: goimports
        entry: goimports -w
        language: system
        types: [go]
      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        pass_filenames: false
        types: [go]
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run ./...
        language: system
        pass_filenames: false
        types: [go]
      - id: go-mod-tidy
        name: go mod tidy
        entry: go mod tidy
        language: system
        pass_filenames: false
        files: '(^go\.(mod|sum)$|\.go$)'
      - id: commitlint
        name: commitlint
        entry: npx --yes --package=@commitlint/cli@19.8.1 --package=@commitlint/config-conventional@19.8.1 commitlint --edit
        language: system
        stages: [commit-msg]
        pass_filenames: true
